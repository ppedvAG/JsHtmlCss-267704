<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width =device-width, initial-scale=1.0">
    <title>JS - Basics</title>
    <link rel="stylesheet" href="style.css">
</head>    
<body>
    <h1>JS Basics</h1>
    <!-- Script wird gestartet -->
    <script>
        window.alert("Achtung!\nEine Meldung");
        document.write(window.prompt("Text eingeben: ", "hallo")+"<br><br>");
        const antwort = window.confirm("Ja?");
        if(antwort) 
            document.write("Super!<br>");
        else
            document.write("Schade!<br>");
        let name = "Max Mustermann"; // string Variable
        let alter = 24; // Number Variable

        // Ausgabe der Variablen
        // document.wirte schreibt in das HTML Dokument
        // Strings kann man mit + aneineinander hängen
        document.write("Name: " + name + "<br>")
        // automatisch am ende ein <br> mit writeln
        document.write("Alter: "+ alter + "<br>")

        //-- Arithmetische Operatoren und Assignment Operatoren --------------------------------------------------------

        // Unterschied String Variablen und Number Variablen beim Addieren
        let zahl1 = "5"
        let zahl2 = "10"
        summe = zahl1 + zahl2
        document.write(summe+"<br>") // ergebnis "510"
        
        zahl1 = 5
        zahl2 = 10
        summe = zahl1 + zahl2
        document.write(summe+"<br>")
        console.log(summe) // ergebnis 15

        document.write(zahl1*zahl2+"<br>")
        document.write(zahl1/zahl2+"<br>")
        document.write(zahl1**zahl2+"<br>")
        document.write(zahl1-zahl2+"<br>")
        document.write(zahl1%zahl2+"<br>")
        zahl1++ // Assignment Operator: verändert den Wert (erhöht um 1)
        document.write(zahl1 + "<br>")
        zahl1-- // Assignment Operator: verändert den Wert (veringert um 1)
        document.write(zahl1 +"<br>")

        // variable erhöhen um 5
        zahl1 = zahl1 + 5
        zahl1 += 5 // gleiches Ergebnis - kürzere Schreibweise

        zahl1 = zahl1 - 3
        zahl1 -= 3
        zahl1 *= 5
        zahl1 /= 10

        zahl1 =100
        //-- Comparison Operatoren --------------------------------------------------------
        if (zahl1 == zahl2) {
            console.log("Zahlen sind gleich "+ zahl1+" "+zahl2)
        } else if(zahl1<zahl2) {
            console.log("Zahl1 ist kleiner "+ zahl1+" "+zahl2)
        } else {
            console.log("Zahl1 ist größer "+ zahl1+" "+zahl2)
        }

        if("5" != 5 ){ // true, der wert ist gleich
            console.log('"5" ist ungleich 5')
        } else {
            console.log('"5" ist gleich 5')
        }
        
        if("5" !== 5 ){ // false, der typ ist nicht gleich
            console.log('"5" ist ungleich 5')
        } else {
            console.log('"5" ist gleich 5')
        }


    </script>
    
</body>
</html>
